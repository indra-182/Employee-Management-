@if (notif.visible()) {
  <div
    class="fixed top-5 right-5 z-50 flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-xl text-white text-sm font-medium animate-fade-in border border-white/20 backdrop-blur-sm"
    [class.bg-yellow-400]="notif.type() === 'warning'"
    [class.bg-red-500]="notif.type() === 'danger'"
  >
    <span class="text-base" [textContent]="notif.type() === 'warning' ? '✏️' : '🗑️'"></span>
    {{ notif.message() }}
  </div>
}

@if (auth.authenticated()) {
  <nav
    class="bg-slate-900 text-white px-5 md:px-10 py-0 flex justify-between items-center border-b border-slate-800 h-14"
  >
    <a
      routerLink="/employees"
      class="flex items-center gap-2.5 font-semibold text-sm tracking-tight hover:opacity-90 transition"
    >
      <span
        class="w-7 h-7 rounded-lg bg-violet-600 flex items-center justify-center text-white text-xs font-bold"
        >EM</span
      >
      <span class="text-white">Employee Management</span>
    </a>
    <button
      (click)="logout()"
      class="text-xs font-medium text-slate-300 hover:text-white border border-slate-700 hover:border-slate-500 px-4 py-1.5 rounded-lg transition cursor-pointer"
    >
      Sign out
    </button>
  </nav>
}

<router-outlet />
