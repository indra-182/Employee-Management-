<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
  <div
    class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 w-full max-w-sm mx-4 animate-slide-in"
  >
    <div class="flex items-center justify-center w-12 h-12 rounded-full bg-violet-100 mx-auto mb-4">
      <svg
        class="w-6 h-6 text-violet-600"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"
        />
      </svg>
    </div>
    <h3 class="text-lg font-bold text-slate-900 text-center">{{ title() }}</h3>
    <p class="text-slate-500 text-sm text-center mt-2">{{ message() }}</p>
    <div class="flex gap-3 mt-6">
      <button
        type="button"
        (click)="cancelled.emit()"
        class="flex-1 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 py-2.5 rounded-xl font-semibold transition text-sm cursor-pointer"
      >
        {{ cancelText() }}
      </button>
      <button
        type="button"
        (click)="confirmed.emit()"
        class="flex-1 bg-violet-600 hover:bg-violet-700 text-white py-2.5 rounded-xl font-semibold transition text-sm shadow-sm cursor-pointer"
      >
        {{ confirmText() }}
      </button>
    </div>
  </div>
</div>
